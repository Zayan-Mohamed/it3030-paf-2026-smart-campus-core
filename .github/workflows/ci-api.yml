name: API CI

on:
    push:
        branches: ["main"]
        paths:
            - "api/**"
            - ".github/workflows/ci-api.yml"
    pull_request:
        branches: ["main"]
        paths:
            - "api/**"
            - ".github/workflows/ci-api.yml"

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./api

        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"
                  cache: maven

            - name: Build with Maven
              run: ./mvnw -B package --file pom.xml

            - name: Run Tests
              run: ./mvnw test


